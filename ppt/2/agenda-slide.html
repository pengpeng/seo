<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agenda — Olares × Intel</title>
<style>
  :root{--paper:#faf9f6;--ink:#141516;--muted:#6b7076;--accent:#2f6f4f;--line:#e7e6e1}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#343735}
  .slide{
    width:1280px;height:720px;overflow:hidden;position:relative;
    background:var(--paper);color:var(--ink);
    font-family:Inter,"Helvetica Neue",Arial,"PingFang SC",sans-serif;
    padding:24px 44px 18px
  }
  h1{font-size:28px;font-weight:800;letter-spacing:-.4px;line-height:1.12;margin-bottom:44px}
  ol{list-style:none;display:flex;flex-direction:column;gap:28px;border-top:2px solid var(--accent);padding-top:32px}
  li{display:flex;align-items:baseline;gap:32px}
  .num{width:44px;flex:none;font-size:16px;font-weight:800;color:var(--accent);letter-spacing:.6px}
  .title{font-size:26px;font-weight:700;letter-spacing:-.3px}
</style>
</head>
<body>
<main class="slide">
  <h1>Agenda</h1>
  <ol>
    <li><span class="num">01</span><span class="title">Project Overview and Demo Video</span></li>
    <li><span class="num">02</span><span class="title">Olares OS Deep-Dive</span></li>
    <li><span class="num">03</span><span class="title">Product View on AI NAS</span></li>
  </ol>
</main>
</body>
</html>
